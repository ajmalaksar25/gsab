name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token needed.
# Configure once on PyPI: project gsab -> Publishing -> add a GitHub publisher
# (owner: ajmalaksar25, repo: gsab, workflow: publish.yml). Then push a tag like v0.2.0.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Inject bundled OAuth client (non-confidential Desktop client)
        run: printf '%s' '${{ secrets.GSAB_OAUTH_CLIENT }}' > src/gsab/auth/client_secret.json
      - name: Build sdist + wheel
        run: pipx run build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
