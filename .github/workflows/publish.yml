name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token needed.
# Configure once on PyPI: project gsab -> Publishing -> add a GitHub publisher
# (owner: ajmalaksar25, repo: gsab, workflow: publish.yml). Then push a tag like v0.2.0.

on:
  push:
    tags: ["v*"]

jobs:
  # Gate: a tagged release must pass lint + the offline suite (incl. 3.9) before it
  # can publish — so a broken build can never reach PyPI again.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests (offline)
        run: |
          pytest tests/test_query.py tests/test_encryption.py tests/test_crud.py \
            tests/test_errors.py tests/test_cli.py tests/test_client_config.py \
            tests/test_auth.py tests/test_update_check.py -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Inject bundled OAuth client (non-confidential Desktop client)
        # Strip a leading UTF-8 BOM if the secret has one — json.load chokes on it.
        run: printf '%s' '${{ secrets.GSAB_OAUTH_CLIENT }}' | sed '1s/^\xEF\xBB\xBF//' > src/gsab/auth/client_secret.json
      - name: Build sdist + wheel
        run: pipx run build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
